{% extends "navbar.html" %}
{% block body %}
{% include "backoffice/sidemenu.html" %}
<main id="main">
    <div class="main-content">
        <div class="form-card">
            <div class="form-card-header">
                <i class="bi bi-file-earmark-text text-primary"></i>
                <span class="form-card-title">Nuevo Informe de Acuda</span>
            </div>

            <div class="form-card-body">
                <form method="post" action="/backoffice/informes_acuda/create" id="form-informe-acuda">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label" for="cliente_id">
                            Cliente <span class="text-danger">*</span>
                        </label>
                        <select id="cliente_id" name="cliente_id" class="form-select form-select-sm" required>
                            <option value="" disabled selected>Selecciona un cliente...</option>
                            {% for cliente in clientes %}
                                <option value="{{ cliente.ClienteID }}">{{ cliente.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="usuario_id">
                            Usuario asignado <span class="text-danger">*</span>
                        </label>
                        <select id="usuario_id" name="usuario_id" class="form-select form-select-sm" required>
                            <option value="" disabled selected>Selecciona un usuario...</option>
                            {% for usuario in usuarios %}
                                <option value="{{ usuario.UserID }}">{{ usuario.username }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="central_id">
                            Central receptora <span class="text-danger">*</span>
                        </label>
                        <select id="central_id" name="central_id" class="form-select form-select-sm" required>
                            <option value="" disabled selected>Selecciona una central...</option>
                            {% for central in centrales %}
                                <option value="{{ central.CentralID }}">{{ central.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="descripcion">
                            Descripción <span class="text-danger">*</span>
                        </label>
                        <textarea id="descripcion" name="descripcion" class="form-control form-control-sm" rows="5" placeholder="Describe la incidencia o el motivo del informe de Acuda..." required></textarea>
                    </div>
                </form>
            </div>

            <div class="form-card-footer">
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
                <button type="submit" form="form-informe-acuda" class="btn btn-primary btn-sm">
                    <i class="bi bi-check-lg me-1"></i>Crear Informe de Acuda
                </button>
            </div>
        </div>
    </div>
</main>
{% endblock body %}
