{% extends "navbar.html" %}
{% block body %}
{% include "backoffice/sidemenu.html" %}
<main id="main">
    {% if action == 'create' %}
        <div class="main-content">
        <div class="form-card">
 
            <div class="form-card-header">
                <i class="bi bi-building text-primary"></i>
                <span class="form-card-title">Nuevo Cuadrante</span>
            </div>
 
            <div class="form-card-body">
                <form method="post" action="/backoffice/users/{{usuario.UserID}}/cuadrantes/create" id="form-cuadrante" enctype="multipart/form-data">
                    {% csrf_token %}
 
                    <div class="mb-3">
                        <label class="form-label" for="nombre">
                          Nombre Identificativo
                        </label>
                        <input type="text" id="nombre" name="nombre" class="form-control form-control-sm" placeholder="Proporcione un nombre para la rápida identificación del cuadrante"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="cuadrante">
                          Cuadrante<span class="text-danger">*</span>
                        </label>
                        <input type="file" id="archivo" name="archivo" accept="application/pdf" class="form-control form-control-sm" required/>
                    </div>

 
                </form>
            </div>
 
            <div class="form-card-footer">
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
                <button type="submit" form="form-cuadrante" class="btn btn-primary btn-sm">
                    <i class="bi bi-check-lg me-1"></i>Crear Cuadrante
                </button>
            </div>
 
        </div>
        </div>
    {% endif %}
    {% if action == 'view' %}
    <!--Listado de usuarios de la empresa, preguntar-->
    <div class="main-content">
        <div class="form-card">
 
            <div class="form-card-header">
                <i class="bi bi-building text-primary"></i>
                <span class="form-card-title">Detalles Cuadrante</span>
            </div>
 
            <div class="form-card-body">
                    <div class="mb-3">
                        <p class="form-label">Nombre</p>
                        <p class="form-control form-control-sm bg-light mb-0">{{ cuadrante.nombre }}</p>
                    </div>

                    <div class="mb-3">
                        <p class="form-label">Cuadrante</p>
                        <iframe 
                            src="{% url "show_pdf" usuario.UserID cuadrante.id %}" 
                            width="100%" 
                            height="800px"
                            type="application/pdf">
                        </iframe>
                    </div>

                    

                    
 
            </div>
            <div class="form-card-footer">
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
            </div>
 
 
        </div>
    </div>
    
    {% endif %}
    
</main>
{% endblock body %}
