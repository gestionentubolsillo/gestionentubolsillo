{%  extends "navbar.html" %}
{% load static %}

{% block body %}

<section class="mb-5 text-center">
    <div class="container">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-12 col-lg- col-xl-7">
                <div class="card shadow-2-strong card-registration" style="border-radius: 15px;">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="mb-4 pb-2 pb-md-0 mb-md-5 display-3 color2">Iniciar sesión</h1>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <form method="post" action="/login">
            {% csrf_token %}
            <div class="row justify-content-center">
                <div class="col-8">
                    <div class="row">
                        <div class="input-group mb-3 col-sm-12 col-lg-6">
                            <span class="input-group-text">Usuario</span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Introduce tu nombre de usuario" required maxlength="150">
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-group mb-3 col-sm-12 col-lg-6">
                            <span class="input-group-text">Contraseña</span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Introduce tu contraseña" required maxlength="128">
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-4 pt-2">
                <input class="btn btn-primary btn-lg" type="submit" value="Iniciar sesión" style="border-radius: 2rem;">
            </div>
            <!--Registro-->
            <div class="mt-4 pt-2">
                <p class="text-center">¿No tienes una cuenta? <a href="/register">Regístrate aquí</a></p>
            </div>
        </form>
        </div>
    </div>
</div>
</div>
</div>
</section>

{% include "footer.html" %}
{% endblock %}
