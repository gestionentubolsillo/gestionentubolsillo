<div class="container py-5">
    <div class="row align-items-center g-5">
        <p class="text-uppercase fw-semibold mb-2" style="color:#f59e0b;font-size:.75rem;letter-spacing:.1em;">Tu negocio, bajo control</p>

        <p class="text-white-50 fs-5 mb-4">Controla partes, clientes, empleados y mucho más desde el móvil. Sencillo, rápido y siempre contigo.</p>
        <div class="col-lg-5 offset-lg-1">
          <div id="heroCarousel" class="carousel slide hero-carousel" data-bs-ride="carousel">
            <div class="carousel-inner">
              <!-- Sustituye .slide-ph por <img src=" static 'img/screenshot-1.png' " alt="..."> -->
              <div class="carousel-item active">
                <div class="slide-ph py-5">
                  <i class="bi bi-phone"></i>

                </div>
              </div>
              <div class="carousel-item">

              <div class="carousel-item">

              </div>
