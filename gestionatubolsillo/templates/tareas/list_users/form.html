{% extends "navbar.html" %}
{% block body %}
{% include "backoffice/sidemenu.html" %}
<main id="main">
        <div class="main-content">
        <div class="form-card">
 
            <div class="form-card-header">
                <i class="bi bi-building text-primary"></i>
                <span class="form-card-title">Nueva Lista</span>
            </div>
 
            <div class="form-card-body">
                <form method="post" action={% if action == 'create' %}"/backoffice/tareas/listados/create" {% elif action == 'edit' %}"/backoffice/tareas/listados/{{listado.id}}/edit"{% endif %} id="form-tarea">
                    {% csrf_token %}
 
                    {% if action == 'create' %}
                        <div class="mb-3">
                            <label class="form-label" for="nombre_tarea">
                              Nombre <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="nombre" name="nombre" class="form-control form-control-sm" placeholder="Ej: tarea Ejemplo S.L." required/>
                        </div>
                    {% elif  action == 'edit' %}
                        <div class="mb-3">
                            <p class="form-label">Nombre</p>
                            <p class="form-control form-control-sm bg-light mb-0">{{listado.nombre}}</p>
                    {% endif %}
                    

                    <div class="mb-3">
                        <label class="form-label" for="users_ids">
                          Usuarios Asignados
                        </label>
                        <select id="users_ids" name="users_ids" class="form-select form-select-sm" required multiple>
                            <option value="" {% if action == 'create' %} selected{% endif %}>Selecciona un usuario...</option>
                            {% for usuario in  usuarios%}
                                <option value="{{usuario.UserID}}" {% if action == 'edit' and usuario.UserID in listado_users %}
                                selected
                                {% endif %}>{{usuario.username}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    
 
                    
 
                </form>
            </div>
 
            <div class="form-card-footer">
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
                <button type="submit" form="form-tarea" class="btn btn-primary btn-sm">
                    <i class="bi bi-check-lg me-1"></i>
                    {% if action == 'create' %}Crear Lista
                    {% elif action == 'edit' %}Editar
                    {% endif %} 
                </button>
            </div>
 
        </div>
        </div>


    
</main>
{% endblock body %}
